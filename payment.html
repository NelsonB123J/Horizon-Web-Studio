<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful</title>
  <style>
    body {
      margin: 0;
      font-family: Segoe UI, Arial, sans-serif;
      background: #f5f7fa;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      background: #fff;
      padding: 40px 30px;
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
      max-width: 460px;
      width: 100%;
    }
    .icon {
      width: 90px;
      height: 90px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: #e6f9f2;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg {
      width: 48px;
      height: 48px;
      color: #2f855a;
    }
    h1 {
      font-size: 28px;
      margin: 0 0 14px;
    }
    p {
      margin: 0 0 24px;
      color: #5f6871;
      line-height: 1.6;
    }
    button {
      border: none;
      background: #2563eb;
      color: #fff;
      padding: 14px 24px;
      border-radius: 999px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6L9 17l-5-5" />
      </svg>
    </div>
    <h1>Payment Successful</h1>
    <p>Thank you! Your transaction has been completed and your payment has been received.</p>
    <button onclick="window.location.href='./index.html'">Return Home</button>
  </div>
</body>
</html>
